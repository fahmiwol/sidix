[tool.pytest.ini_options]
# Only collect tests from tests/ directory — prevents collecting
# workstation/utility scripts in docs/ or deploy-scripts/.
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "B"]
ignore = ["E501", "B008"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
